name: checkov-benchmark

# Head-to-head reference scanner for the audytx benchmark corpus.
# Each `bench/<repo>` PR adds a corpus/<repo>/ folder of real AWS Terraform;
# audytx (the GitHub App) auto-comments its findings, and this workflow runs
# Checkov on the same files and posts ITS findings, so every PR is a live
# audytx-vs-Checkov comparison on the same diff.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  checkov:
    name: Checkov (reference)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install --quiet checkov

      - name: Run Checkov on corpus/
        id: scan
        run: |
          if [ ! -d corpus ]; then
            echo "No corpus/ on this branch — nothing to benchmark."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # JSON output → robust per-framework counts. (The old CLI `tail -1`
          # grabbed the LAST framework summary — e.g. the near-empty `secrets`
          # framework — instead of the terraform total.)
          checkov -d corpus -o json --quiet --soft-fail > checkov.json 2>/dev/null || true
          # Terraform framework = the IaC-misconfig comparison (excludes the secrets framework).
          TF_FAILED=$(jq '[.. | objects | select(.check_type=="terraform") | .summary.failed] | add // 0' checkov.json 2>/dev/null || echo 0)
          TF_PASSED=$(jq '[.. | objects | select(.check_type=="terraform") | .summary.passed] | add // 0' checkov.json 2>/dev/null || echo 0)
          ALL_FAILED=$(jq '[.. | objects | select(has("summary")) | .summary.failed] | add // 0' checkov.json 2>/dev/null || echo 0)
          SUMMARY="Terraform framework — Passed: ${TF_PASSED}, Failed: ${TF_FAILED}  (all frameworks failed: ${ALL_FAILED})"
          jq -r '[.. | objects | select(.check_type=="terraform") | .results.failed_checks[]?.check_id] | .[]' checkov.json 2>/dev/null \
            | sort | uniq -c | sort -rn | head -40 > checkov_failed.txt || true
          { echo "summary=$SUMMARY"; echo "skip=false"; } >> "$GITHUB_OUTPUT"
          # Always-visible fallback (no permissions needed): job summary.
          { echo "## 🔍 Checkov benchmark (reference)"; echo ""; echo "**$SUMMARY**"; echo ""; echo '```'; cat checkov_failed.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment results on the PR
        if: steps.scan.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = `${{ steps.scan.outputs.summary }}`;
            let failed = '(none)';
            try { const t = fs.readFileSync('checkov_failed.txt','utf8').trim(); if (t) failed = t; } catch (e) {}
            const body = [
              '## 🔍 Checkov benchmark (reference — head-to-head with audytx)',
              '',
              '**' + summary + '**',
              '',
              'Compare *Terraform Failed* + the rule list below against audytx\'s comment on this PR.',
              'On **precision** repos (terraform-aws-modules, secure-baseline) Checkov failures here are candidate **false positives**; on the **\\*goat** repos they are recall ground truth.',
              '',
              '<details><summary>Top failed Checkov terraform rules (count × rule id)</summary>',
              '',
              '```',
              failed,
              '```',
              '</details>',
              '',
              '_Reference run by `.github/workflows/checkov-benchmark.yml`._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const mine = comments.find(c => c.body && c.body.includes('Checkov benchmark (reference'));
            if (mine) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
