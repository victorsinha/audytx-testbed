    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "TBD — verify from SARIF in Step 3"
        justification: >
          One high-severity finding remained after the v0.3.3→v0.3.9 improvement
          (-1 from 2). Specific rule and location to be confirmed from SARIF in
          Step 3. If it is in example code (the module's examples/ use
          server-side encryption demos), it belongs here as an example_code
          exception; if in the module core, it is a genuine calibration item.
        location: "example_code"
        calibration_action: "INVESTIGATE"

  - name: terraform-aws-secure-baseline
