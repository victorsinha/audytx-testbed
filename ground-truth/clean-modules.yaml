# Ground-truth labels for the 21 clean production modules
#
# These are well-maintained Terraform modules from terraform-aws-modules/,
# cloudposse/, trussworks/, and nozaq/ that thousands of teams run in
# production. The claim being measured: a high-severity alert on any of
# these is a false positive (or a genuine finding in example/test code, not
# in production usage of the module).
#
# expected_high_severity_findings: 0 for every module — the expected result
# for a correctly calibrated scanner on production-grade code.
#
# known_exceptions: findings that audytx currently emits on this module that
# have a documented justification. Each exception MUST have:
#   - rule_id: the audytx rule that fires
#   - justification: why the finding is acceptable/expected here
#   - location: "example_code" | "module_variable" | "design_choice"
#   - calibration_action: "SUPPRESS" | "INVESTIGATE" | "ACCEPTED"
#
# Exception locations:
#   example_code: finding is in the module's examples/ or test fixtures,
#                 not in the reusable module code itself. Users who call
#                 the module with production values would not trigger this.
#   module_variable: the concerning attribute is exposed as a module
#                    variable; absence of a default isn't a missing value —
#                    callers supply it.
#   design_choice: the module intentionally configures something this way
#                  (e.g., EKS intra-cluster SGs open on all ports).
#
# Conflict of interest disclosure: audytx authored this file.
# Exceptions were derived from the v0.3.9 benchmark run and the calibration
# notes in docs/benchmark-2026-06-10.md. SARIF-level finding IDs will be
# filled in during Step 3 (audytx SARIF re-pull).
#
# Source branches: bench/terraform-aws-*, bench/cloudposse-s3-bucket,
#                  bench/trussworks-s3-private
# Audytx version at last check: v0.3.26 (will be re-verified in Step 3)

modules:

  - name: terraform-aws-vpc
    repo: "terraform-aws-modules/terraform-aws-vpc"
    bench_branch: "bench/terraform-aws-vpc"
    expected_high_severity_findings: 0
    v0_3_9_actual: 0
    known_exceptions: []

  - name: terraform-aws-s3-bucket
    repo: "terraform-aws-modules/terraform-aws-s3-bucket"
    bench_branch: "bench/terraform-aws-s3-bucket"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_S3_003"
        justification: >
          AWS_S3_003 (S3 public access block not fully enabled) fires on the module
          examples demonstrating S3 access configuration options. The module core
          defaults to full public-access block; the finding is in an example that
          intentionally shows a partially-enabled configuration.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-secure-baseline
    repo: "nozaq/terraform-aws-secure-baseline"
    bench_branch: "bench/terraform-aws-secure-baseline"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_S3_010"
        justification: >
          AWS_S3_010 (S3 bucket missing access logging) fires on a bucket in the
          secure-baseline module. The secure-baseline module creates a logging
          destination bucket; the finding is on that logging bucket itself, which
          does not log its own access (log-of-logs). This is an accepted design
          choice — circular logging to the same bucket is not practical.
        location: "design_choice"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-eks
    repo: "terraform-aws-modules/terraform-aws-eks"
    bench_branch: "bench/terraform-aws-eks"
    expected_high_severity_findings: 0
    v0_3_9_actual: 6
    known_exceptions:
      - rule_id: "AWS_VPC_006"
        justification: >
          AWS_VPC_006 (all-ports-open security group) fires on the EKS module's
          node-group security groups and the cluster SG examples. EKS node groups
          routinely allow all ports intra-cluster (the SG restricts by source SG,
          not by port), and the module's example configurations use
          from_port=0/to_port=65535 to demonstrate this. The rule should require
          the offending rule to also allow traffic from 0.0.0.0/0 before firing
          at High; an intra-cluster SG without an internet-sourced ingress rule
          is not a public exposure. Tracked for suppression via the
          sg_eks_identity context axis (add structural signal: source_security_group_id
          is set on the ingress rule → suppress).
        location: "design_choice"
        calibration_action: "SUPPRESS"

  - name: terraform-aws-rds
    repo: "terraform-aws-modules/terraform-aws-rds"
    bench_branch: "bench/terraform-aws-rds"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_CRED_003"
        justification: >
          AWS_CRED_003 fires on a hardcoded example password in the module's
          examples/complete/ directory (a demo value like "YourPwdShouldBeLongAndComplex!").
          This is example code with a visible placeholder; production callers
          pass a real secret via variable. Example passwords in documented
          examples are a known false-positive class for credential-pattern rules.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-lambda
    repo: "terraform-aws-modules/terraform-aws-lambda"
    bench_branch: "bench/terraform-aws-lambda"
    expected_high_severity_findings: 0
    v0_3_9_actual: 3
    known_exceptions:
      - rule_id: "AWS_DDB_001,AWS_SM_001,AWS_ECR_001,AWS_EFS_001,AWS_OPS_010,AWS_KINESIS_001"
        justification: >
          v0.4.1 fires 6 HIGH findings (up from 3 in v0.3.9). All 6 are in the
          lambda module's complete example which creates associated resources
          (DynamoDB, Secrets Manager, ECR, EFS, Kinesis) to demonstrate full
          integration patterns. These associated resources in examples/ are not
          hardened to production standards — they exist to show the integration
          surface, not as production templates. All are example_code exceptions.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-iam
    repo: "terraform-aws-modules/terraform-aws-iam"
    bench_branch: "bench/terraform-aws-iam"
    expected_high_severity_findings: 0
    v0_3_9_actual: 2
    known_exceptions:
      - rule_id: "AWS_IAM_006,AWS_OPS_038"
        justification: >
          AWS_IAM_006 (hardcoded IAM access key) and AWS_OPS_038 (IAM user with
          dangerous grants) fire on the IAM module's examples which demonstrate
          managing IAM users and policies — by design, these examples show
          permissive configurations to illustrate the module's full capability.
          The module core does not create keys or overly-permissive policies;
          the findings are in the examples directory.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-alb
    repo: "terraform-aws-modules/terraform-aws-alb"
    bench_branch: "bench/terraform-aws-alb"
    expected_high_severity_findings: 0
    v0_3_9_actual: 5
    known_exceptions:
      - rule_id: "ATTACK_PATH_002"
        justification: >
          ATTACK_PATH_002 (internet-facing ALB fronting an ECS task with an
          escalation-capable execution role) fires on the ALB module examples.
          The module's complete example wires an ALB to an ECS service with a
          permissive execution role to demonstrate all integration points.
          This is a cross-resource finding in example code — in production,
          callers supply a least-privilege execution role. The finding class is
          correct in principle; the module's examples trigger it by demonstrating
          everything together.
        location: "example_code"
        calibration_action: "ACCEPTED"
      - rule_id: "AWS_EC2_006"
        justification: >
          AWS_EC2_006 (EC2 instance with metadata service enabled and no IMDSv2
          enforcement) fires 4 times on EC2 instances in the ALB module's complete
          example (which also provisions an ECS cluster with EC2 launch type).
          The example instances are not hardened — the module demonstrates the
          ALB integration surface, not the compute security baseline. Example code.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-cloudfront
    repo: "terraform-aws-modules/terraform-aws-cloudfront"
    bench_branch: "bench/terraform-aws-cloudfront"
    expected_high_severity_findings: 0
    v0_3_9_actual: 0
    known_exceptions: []

  - name: terraform-aws-sqs
    repo: "terraform-aws-modules/terraform-aws-sqs"
    bench_branch: "bench/terraform-aws-sqs"
