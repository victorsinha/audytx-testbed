        location: "example_code"
        calibration_action: "INVESTIGATE"

  - name: terraform-aws-eks
    repo: "terraform-aws-modules/terraform-aws-eks"
    bench_branch: "bench/terraform-aws-eks"
    expected_high_severity_findings: 0
    v0_3_9_actual: 6
    known_exceptions:
      - rule_id: "AWS_VPC_006"
        justification: >
          AWS_VPC_006 (all-ports-open security group) fires on the EKS module's
          node-group security groups and the cluster SG examples. EKS node groups
          routinely allow all ports intra-cluster (the SG restricts by source SG,
          not by port), and the module's example configurations use
          from_port=0/to_port=65535 to demonstrate this. The rule should require
          the offending rule to also allow traffic from 0.0.0.0/0 before firing
          at High; an intra-cluster SG without an internet-sourced ingress rule
          is not a public exposure. Tracked for suppression via the
          sg_eks_identity context axis (add structural signal: source_security_group_id
          is set on the ingress rule → suppress).
        location: "design_choice"
        calibration_action: "SUPPRESS"

  - name: terraform-aws-rds
    repo: "terraform-aws-modules/terraform-aws-rds"
    bench_branch: "bench/terraform-aws-rds"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_CRED_003"
        justification: >
          AWS_CRED_003 fires on a hardcoded example password in the module's
          examples/complete/ directory (a demo value like "YourPwdShouldBeLongAndComplex!").
          This is example code with a visible placeholder; production callers
          pass a real secret via variable. Example passwords in documented
          examples are a known false-positive class for credential-pattern rules.
        location: "example_code"
        calibration_action: "ACCEPTED"

