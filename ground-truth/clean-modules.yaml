    bench_branch: "bench/terraform-aws-alb"
    expected_high_severity_findings: 0
    v0_3_9_actual: 5
    known_exceptions:
      - rule_id: "ATTACK_PATH_002"
        justification: >
          ATTACK_PATH_002 (internet-facing ALB fronting an ECS task with an
          escalation-capable execution role) fires on the ALB module examples.
          The module's complete example wires an ALB to an ECS service with a
          permissive execution role to demonstrate all integration points.
          This is a cross-resource finding in example code — in production,
          callers supply a least-privilege execution role. The finding class is
          correct in principle; the module's examples trigger it by demonstrating
          everything together.
        location: "example_code"
        calibration_action: "ACCEPTED"
      - rule_id: "TBD — additional findings; verify from SARIF in Step 3"
        justification: >
          4 of the 5 findings need SARIF-level verification. ATTACK_PATH_002
          is confirmed above; the remaining findings are to be identified in
          Step 3.
        location: "example_code"
        calibration_action: "INVESTIGATE"

