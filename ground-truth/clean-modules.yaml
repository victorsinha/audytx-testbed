# Ground-truth labels for the 21 clean production modules
#
# These are well-maintained Terraform modules from terraform-aws-modules/,
# cloudposse/, trussworks/, and nozaq/ that thousands of teams run in
# production. The claim being measured: a high-severity alert on any of
# these is a false positive (or a genuine finding in example/test code, not
# in production usage of the module).
#
# expected_high_severity_findings: 0 for every module — the expected result
# for a correctly calibrated scanner on production-grade code.
#
# known_exceptions: findings that audytx currently emits on this module that
# have a documented justification. Each exception MUST have:
#   - rule_id: the audytx rule that fires
#   - justification: why the finding is acceptable/expected here
#   - location: "example_code" | "module_variable" | "design_choice"
#   - calibration_action: "SUPPRESS" | "INVESTIGATE" | "ACCEPTED"
#
# Exception locations:
#   example_code: finding is in the module's examples/ or test fixtures,
#                 not in the reusable module code itself. Users who call
#                 the module with production values would not trigger this.
#   module_variable: the concerning attribute is exposed as a module
#                    variable; absence of a default isn't a missing value —
#                    callers supply it.
#   design_choice: the module intentionally configures something this way
#                  (e.g., EKS intra-cluster SGs open on all ports).
#
# Conflict of interest disclosure: audytx authored this file.
# Exceptions were derived from the v0.3.9 benchmark run and the calibration
# notes in docs/benchmark-2026-06-10.md. SARIF-level finding IDs will be
# filled in during Step 3 (audytx SARIF re-pull).
#
# Source branches: bench/terraform-aws-*, bench/cloudposse-s3-bucket,
#                  bench/trussworks-s3-private
# Audytx version at last check: v0.3.26 (will be re-verified in Step 3)

