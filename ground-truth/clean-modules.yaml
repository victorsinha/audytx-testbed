  - name: terraform-aws-ecr
    repo: "terraform-aws-modules/terraform-aws-ecr"
    bench_branch: "bench/terraform-aws-ecr"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_ECR_001"
        justification: >
          AWS_ECR_001 (ECR repository missing image scan on push) fires on the
          module's example configuration which creates a repository without
          scan-on-push enabled. The module itself does not set this default
          (callers control it via variable); the example omits it to keep the
          demo minimal.
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-autoscaling
    repo: "terraform-aws-modules/terraform-aws-autoscaling"
    bench_branch: "bench/terraform-aws-autoscaling"
    expected_high_severity_findings: 0
    v0_3_9_actual: 0
