  - name: terraform-aws-security-group
    repo: "terraform-aws-modules/terraform-aws-security-group"
    bench_branch: "bench/terraform-aws-security-group"
    expected_high_severity_findings: 0
    v0_3_9_actual: 2
    known_exceptions:
      - rule_id: "AWS_VPC_006"
        justification: >
          AWS_VPC_006 fires on the security-group module's own example
          configurations that deliberately show wide-open groups (from_port=0,
          to_port=65535, cidr_blocks=["0.0.0.0/0"]) to demonstrate the module's
          capability to express any SG rule. These are documentation examples,
          not production defaults. The module itself is a generic SG factory —
          it cannot be hardened by default without breaking its purpose.
          "Legitimate finding on the examples but module itself is correct"
          (benchmark-2026-06-10.md).
        location: "example_code"
        calibration_action: "ACCEPTED"

  - name: terraform-aws-ecs
    repo: "terraform-aws-modules/terraform-aws-ecs"
    bench_branch: "bench/terraform-aws-ecs"
    expected_high_severity_findings: 0
    v0_3_9_actual: 3
    known_exceptions:
      - rule_id: "AWS_ECS_006"
        justification: >
          AWS_ECS_006 (missing task_role_arn) fires on ECS task definitions in
          the module where task_role_arn is declared as a module variable with no
          default. The module intentionally leaves this configurable; absence of
          a default value does not mean production callers omit a role — it means
          callers must supply one. A suppression via module_variable detection
          (task_role_arn = var.*) would eliminate this class of false positive.
          Tracked in benchmark-2026-06-10.md calibration notes.
        location: "module_variable"
        calibration_action: "SUPPRESS"

  - name: terraform-aws-eventbridge
    repo: "terraform-aws-modules/terraform-aws-eventbridge"
    bench_branch: "bench/terraform-aws-eventbridge"
    expected_high_severity_findings: 0
    v0_3_9_actual: 1
    known_exceptions:
      - rule_id: "AWS_DDB_001,AWS_CT_001,AWS_CT_002,AWS_KINESIS_001"
        justification: >
          v0.4.1 fires 7 HIGH findings (up from 1 in v0.3.9 — new rules added).
          The EventBridge complete example creates a full integration environment
          including DynamoDB tables, CloudTrail trails, and Kinesis streams as
          event targets. Rules AWS_DDB_001 (DDB missing PITR), AWS_CT_001/002
          (CloudTrail missing log validation/S3 MFA delete), and AWS_KINESIS_001
          (Kinesis missing encryption) all fire on these associated resources in
          the examples. The EventBridge module itself is correct; the findings are
          on example infrastructure demonstrating the integration surface.
        location: "example_code"
        calibration_action: "ACCEPTED"

