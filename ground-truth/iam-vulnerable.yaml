# Ground-truth labels for the iam-vulnerable corpus
#
# Total documented privesc paths: 31
# Source: BishopFox iam-vulnerable README
#   https://github.com/BishopFox/iam-vulnerable (Seth Art, @sethsec)
#   Upstream documents 31 paths — "Currently supported privilege escalation paths: 31"
#   Original Rhino Security Labs catalog (Spencer Gietzen):
#   https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
#   https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation-part-2/
#
# Corpus branch: bench/iam-vulnerable
# Corpus commit: 85b0eee7a55a29005af5fc28a500c0707297d4af (2026-06-13)
# Corpus path in testbed: corpus/iam-vulnerable/
#
# Each entry represents one intentional IAM privilege-escalation path.
# terraform_resources lists the primary resource(s) that grant the dangerous
# permission (the policy resource + the user/role it is attached to).
# non_free_modules_required: paths that require a non-default (billed) module
#   deployed to be fully exploitable at runtime — the IAM policy is still present
#   in the free-resources module and is detectable at static scan time.
#
# Conflict of interest disclosure: this ground-truth file was authored by
# the audytx team. All entries reference upstream BishopFox documentation.
# The mapping from BishopFox path → Terraform resource name is derivable
# mechanically from the resource name / description in each .tf file.

paths:

  # ── Category: IAM Permissions on Other Users ──────────────────────────────

  - id: GT-001
    method: "IAM-CreateNewPolicyVersion"
    bishopfox_name: "IAM-CreateNewPolicyVersion"
    rhino_method: "CreatePolicyVersion"
    source: "https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/"
    terraform_resources:
      - "aws_iam_policy.privesc1-CreateNewPolicyVersion"
      - "aws_iam_user.privesc1-CreateNewPolicyVersion-user"
      - "aws_iam_role.privesc1-CreateNewPolicyVersion-role"
    files:
      - "corpus/iam-vulnerable/modules/free-resources/privesc-paths/privesc1-CreateNewPolicyVersion.tf"
    non_free_modules_required: []
    notes: >
      Policy grants iam:CreatePolicyVersion with Resource:*. Allows overwriting
      any managed policy's non-default version with an admin-granting version,
      then setting it as the default.

  - id: GT-002
    method: "IAM-SetExistingDefaultPolicyVersion"
    bishopfox_name: "IAM-SetExistingDefaultPolicyVersion"
    rhino_method: "SetDefaultPolicyVersion"
