    files:
      - "corpus/iam-vulnerable/modules/free-resources/privesc-paths/privesc2-SetExistingDefaultPolicyVersion.tf"
    non_free_modules_required: []
    notes: >
      Policy grants iam:SetDefaultPolicyVersion with Resource:*. Exploitable only
      if a policy with a previously created admin version exists in the account.
      The upstream comment in the TF file notes this limitation explicitly.

