  # ── Category: Privilege Escalation using AWS Services ─────────────────────

  - id: GT-026
    method: "STS-AssumeRole"
    bishopfox_name: "STS-AssumeRole"
    rhino_method: "AssumeRole"
    source: "https://pswalia2u.medium.com/aws-iam-privilege-escalation-paths-cba36be1aa9e"
    terraform_resources:
      - "aws_iam_policy.privesc-AssumeRole-high-priv-policy"
      - "aws_iam_role.privesc-AssumeRole-starting-role"
      - "aws_iam_role.privesc-AssumeRole-intermediate-role"
      - "aws_iam_role.privesc-AssumeRole-ending-role"
      - "aws_iam_user.privesc-AssumeRole-start-user"
    files:
      - "corpus/iam-vulnerable/modules/free-resources/privesc-paths/privesc-AssumeRole.tf"
    non_free_modules_required: []
    notes: >
      Multi-hop role chain: starting-role → intermediate-role → ending-role. The
      ending role has Action:* Resource:*. The chain is traversable by following
      trust policies. This is the multi-hop AssumeRole pattern audytx models with
      AWS_IAM_022 (role-chaining).

